services:
  db:
    image: postgres:15
    container_name: middts_db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-middts}
    ports:
      - "${DB_HOST_PORT:-5433}:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    networks:
      - middts_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 8

  redis:
    image: redis:7-alpine
    container_name: middts_redis
    command: ["redis-server", "--maxmemory", "64mb", "--maxmemory-policy", "volatile-lru"]
    ports:
      - "6379:6379"
    networks:
      - middts_net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  neo4j:
    image: neo4j:5.8
    container_name: middts_neo4j
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      # Neo4j requires initial admin username to be `neo4j`.
      NEO4J_AUTH: ${NEO4J_AUTH:-neo4j/middts123}
    volumes:
      - neo4j_data:/data
    networks:
      - middts_net
    healthcheck:
      # use $$ to escape $ so Compose doesn't interpolate; the expansion happens
      # inside the container shell at runtime
      test: ["CMD-SHELL", "USER=$${NEO4J_AUTH%%/*}; PASS=$${NEO4J_AUTH#*/}; cypher-shell -a bolt://localhost:7687 -u \"$$USER\" -p \"$$PASS\" 'RETURN 1'"]
      interval: 10s
      timeout: 5s
      retries: 10

  influxdb:
    image: influxdb:2.7
    container_name: middts_influxdb
    ports:
      - "8086:8086"
    environment:
      DOCKER_INFLUXDB_INIT_MODE: setup
      DOCKER_INFLUXDB_INIT_USERNAME: ${INFLUXDB_INIT_USERNAME:-middts}
      DOCKER_INFLUXDB_INIT_PASSWORD: ${INFLUXDB_INIT_PASSWORD:-middts123}
      DOCKER_INFLUXDB_INIT_ORG: ${INFLUXDB_ORGANIZATION:-middts}
      DOCKER_INFLUXDB_INIT_BUCKET: ${INFLUXDB_BUCKET:-iot_data}
      DOCKER_INFLUXDB_INIT_ADMIN_TOKEN: ${INFLUXDB_TOKEN:-admin_token_middts}
    volumes:
      - influxdb_data:/var/lib/influxdb2
      - influxdb_data_root:/root/.influxdbv2
    networks:
      - middts_net
    healthcheck:
      test: ["CMD", "influx", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  parser:
    image: andregustavoo/parserwebapi:latest
    container_name: middts_parser
    ports:
      - "8082:8080"
      - "8083:8081"
    environment:
      ASPNETCORE_URLS: http://0.0.0.0:8080
    restart: unless-stopped
    networks:
      - middts_net

  middleware:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: middts_middleware
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      neo4j:
        condition: service_healthy
      influxdb:
        condition: service_healthy
    environment:
      DJANGO_SETTINGS_MODULE: middleware_dt.settings_base
      HOST_IP: ${HOST_IP:-10.22.1.247}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-localhost,127.0.0.1,10.22.1.247,*}
      CSRF_TRUSTED_ORIGINS: ${CSRF_TRUSTED_ORIGINS:-http://localhost,http://127.0.0.1,http://${HOST_IP:-10.22.1.247},http://${HOST_IP:-10.22.1.247}:8000}
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-middts}
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-middts}
      PGPASSWORD: ${POSTGRES_PASSWORD:-postgres}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      NEO4J_URL: ${NEO4J_URL:-neo4j:7687}
      NEO4J_USER: ${NEO4J_USER:-neo4j}
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-middts123}
      INFLUXDB_HOST: influxdb
      INFLUXDB_PORT: 8086
      INFLUXDB_BUCKET: ${INFLUXDB_BUCKET:-iot_data}
      INFLUXDB_ORGANIZATION: ${INFLUXDB_ORGANIZATION:-middts}
      INFLUXDB_TOKEN: ${INFLUXDB_TOKEN:-admin_token_middts}
      START_LISTENER_AFTER_TB: ${START_LISTENER_AFTER_TB:-0}
      THINGSBOARD_HOST: ${MIDDLEWARE_THINGSBOARD_HOST:-demo.thingsboard.io}
      TB_HOST: ${MIDDLEWARE_TB_HOST:-demo.thingsboard.io}
      TB_PORT: ${MIDDLEWARE_TB_PORT:-443}
      TB_SCHEME: ${MIDDLEWARE_TB_SCHEME:-https}
    healthcheck:
      test: ["CMD", "python", "manage.py", "check"]
      interval: 30s
      timeout: 60s
      retries: 5
    restart: unless-stopped
    volumes:
      - static_volume:/middleware-dt/static
    networks:
      - middts_net

  nginx:
    image: nginx:latest
    container_name: middts_nginx
    ports:
      - "${MIDDLEWARE_PORT:-8000}:80"
    depends_on:
      middleware:
        condition: service_healthy
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - static_volume:/etc/nginx/staticfiles/static
    networks:
      - middts_net

  simulator:
    profiles: ["simulator"]
    build:
      context: ../iot_simulator
      dockerfile: Dockerfile
    container_name: iot_simulator
    depends_on:
      influxdb:
        condition: service_healthy
    environment:
      DJANGO_SETTINGS_MODULE: iot_simulator.settings_base
      DEBUG: ${SIMULATOR_DEBUG:-False}
      ALLOWED_HOSTS: ${SIMULATOR_ALLOWED_HOSTS:-*}
      THINGSBOARD_HOST: ${SIMULATOR_THINGSBOARD_HOST:-https://demo.thingsboard.io}
      THINGSBOARD_USER: ${THINGSBOARD_USER:-tenant@thingsboard.org}
      THINGSBOARD_PASSWORD: ${THINGSBOARD_PASSWORD:-tenant}
      THINGSBOARD_MQTT_PORT: ${THINGSBOARD_MQTT_PORT:-1883}
      THINGSBOARD_MQTT_KEEP_ALIVE: ${THINGSBOARD_MQTT_KEEP_ALIVE:-60}
      HEARTBEAT_INTERVAL: ${HEARTBEAT_INTERVAL:-5}
      INFLUXDB_HOST: influxdb
      INFLUXDB_PORT: 8086
      INFLUXDB_BUCKET: ${SIMULATOR_INFLUXDB_BUCKET:-iot_data}
      INFLUXDB_ORGANIZATION: ${INFLUXDB_ORGANIZATION:-middts}
      INFLUXDB_TOKEN: ${INFLUXDB_TOKEN:-admin_token_middts}
      SIMULATOR_NUMBER: ${SIMULATOR_NUMBER:-1}
      RANDOMIZE: ${RANDOMIZE:-1}
      USE_MEMORY_STATE: ${USE_MEMORY_STATE:-1}
    ports:
      - "${SIMULATOR_PORT:-8001}:8001"
    restart: unless-stopped
    networks:
      - middts_net
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8001/ >/dev/null 2>&1 || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 6

networks:
  middts_net:
    driver: bridge

volumes:
  db_data:
  static_volume:
  influxdb_data:
  influxdb_data_root:
  neo4j_data:
